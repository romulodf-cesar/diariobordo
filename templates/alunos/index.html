<!-- DTL (Django Template Engine) -->
{% load static  %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos - Logbook</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Playfair Display e Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Variáveis baseadas na Identidade Visual */
        :root {
            --color-primary: #006064;
            --color-action: #FF7043;
            --color-attention: #C5B358;
            --color-surface: #F4F7F6;
            --color-text: #263238;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .registration-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 96, 100, 0.08);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            border: none;
        }

        .card-header-custom {
            background-color: #ffffff;
            padding: 40px 40px 20px 40px;
            text-align: center;
            border: none;
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* Simulação do Ícone da Bússola via SVG */
        .compass-icon {
            width: 45px;
            height: 45px;
            fill: var(--color-primary);
        }

        .brand-name {
            font-family: var(--font-title);
            font-size: 2.2rem;
            color: var(--color-primary);
            margin: 0;
            font-weight: 700;
        }

        h2 {
            font-family: var(--font-title);
            color: var(--color-text);
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(0, 96, 100, 0.1);
            outline: none;
        }

        .btn-register {
            background-color: var(--color-action);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-register:hover {
            background-color: #e65b2d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 112, 67, 0.3);
            color: white;
        }

        .form-container {
            padding: 0 40px 40px 40px;
        }

        /* Estilização Responsiva */
        @media (max-width: 576px) {
            .form-container, .card-header-custom {
                padding: 30px 20px;
            }
            .brand-name {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="registration-card animate__animated animate__fadeIn">
        <div class="card-header-custom">
            <div class="logo-placeholder">
                <!-- Ícone representativo da bússola baseada na imagem -->
                <svg class="compass-icon" viewBox="0 0 100 100">
                    <path d="M50 5 L60 40 L95 50 L60 60 L50 95 L40 60 L5 50 L40 40 Z" fill="none" stroke="currentColor" stroke-width="4"/>
                    <circle cx="50" cy="50" r="6" fill="currentColor"/>
                    <path d="M50 20 L50 30 M80 50 L70 50 M50 80 L50 70 M20 50 L30 50" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <h1 class="brand-name">logbook</h1>
            </div>
            <h2>Cadastro de Aluno</h2>
            <p class="text-muted small mt-2">Preencha os dados para registrar um novo estudante</p>
        </div>

        <div class="form-container">
            <form id="studentForm">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail Institucional</label>
                    <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <button type="submit" class="btn-register">Finalizar Cadastro</button>
            </form>
            
            <div id="messageBox" class="mt-4 d-none">
                <div class="alert alert-success d-flex align-items-center" role="alert">
                    <div>
                        Cadastro realizado com sucesso!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Opcional para funcionalidades interativas) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Lógica simples para feedback visual ao enviar
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const message = document.getElementById('messageBox');
            
            btn.innerHTML = 'Processando...';
            btn.disabled = true;

            // Simula um delay de rede
            setTimeout(() => {
                btn.innerHTML = 'Finalizar Cadastro';
                btn.disabled = false;
                message.classList.remove('d-none');
                this.reset();
                
                // Esconde a mensagem após 3 segundos
                setTimeout(() => {
                    message.classList.add('d-none');
                }, 3000);
            }, 1000);
        });
    </script>
</body>
</html>
